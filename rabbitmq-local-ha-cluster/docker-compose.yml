version: "5.1"
services:
  haproxy:
    image: haproxy:3.2
    container_name: haproxy_load_balancer
    ports:
      - "5672:5672" ##RABBIT MQ CLASSIC
      - "5552:5552" ##RABBIT MQ STREAMS
      - "15672:15672" ##RABBIT MQ UI MNGMT
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    networks:
      - rabbitmq-cluster
    depends_on:
      - rabbitmq1
      - rabbitmq2
      - rabbitmq3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

  rabbitmq1:
    image: rabbitmq:4-management
    hostname: rabbitmq1
    environment:
      - RABBITMQ_ERLANG_COOKIE=my-secret-cookie
      - RABBITMQ_NODENAME=rabbitmq1
    networks:
      - rabbitmq-cluster
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M  

  rabbitmq2:
    image: rabbitmq:4-management
    hostname: rabbitmq2
    environment:
      - RABBITMQ_ERLANG_COOKIE=my-secret-cookie
      - RABBITMQ_NODENAME=rabbitmq2
    networks:
      - rabbitmq-cluster
    depends_on:
      - rabbitmq1
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M  

  rabbitmq3:
    image: rabbitmq:4-management
    hostname: rabbitmq3
    environment:
      - RABBITMQ_ERLANG_COOKIE=my-secret-cookie
      - RABBITMQ_NODENAME=rabbitmq3
    networks:
      - rabbitmq-cluster
    depends_on:
      - rabbitmq1
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M  

networks:
  rabbitmq-cluster: